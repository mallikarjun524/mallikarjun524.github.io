name: Sync README to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy README
        run: cp README.md index.md

      - name: Commit index.md
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add index.md

          git diff --cached --quiet || git commit -m "Update index.md"

          git push
